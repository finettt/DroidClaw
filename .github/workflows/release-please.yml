name: CalVer Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - closed
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

env:
  RELEASE_BRANCH_PREFIX: "release/v"

jobs:
  # Job 1: Create or update release PR on push to main
  create-release-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for existing release PR
        id: check_pr
        run: |
          # Check if there's already an open release PR
          EXISTING_PR=$(gh pr list --head "release/" --state open --json number,headRefName --jq '.[0]')
          if [ -n "$EXISTING_PR" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            BRANCH=$(echo "$EXISTING_PR" | jq -r '.headRefName')
            echo "existing_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
            echo "Found existing release PR #${PR_NUMBER} on branch ${BRANCH}"
          else
            echo "existing_pr=false" >> $GITHUB_OUTPUT
            echo "No existing release PR found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CalVer version
        id: version
        run: |
          # Generate CalVer version: YYYY.MM.DD
          VERSION=$(date -u +"%Y.%m.%d")
          
          # Check if this version tag already exists
          PATCH=0
          BASE_VERSION=$VERSION
          while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            VERSION="${BASE_VERSION}.${PATCH}"
          done
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Get changes since last release
        id: changes
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found"
            echo "changes=Initial release" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # Check if there are commits since last tag
            COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline 2>/dev/null || echo "")
            if [ -n "$COMMITS" ]; then
              echo "Changes found since ${LATEST_TAG}"
              echo "has_changes=true" >> $GITHUB_OUTPUT
              {
                echo "changes<<EOF"
                git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)"
                echo ""
                echo "EOF"
              } >> $GITHUB_OUTPUT
            else
              echo "No changes since ${LATEST_TAG}"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create release branch and PR
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true' && steps.check_pr.outputs.existing_pr == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="release/v${VERSION}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create release branch
          git checkout -b "${BRANCH_NAME}"
          
          # Update version in build.gradle.kts
          sed -i "s/versionName = \".*\" \/\/ x-release-please-version/versionName = \"${VERSION}\" \/\/ x-release-please-version/" app/build.gradle.kts
          
          # Update versionCode based on date (YYYYMMDD format as integer)
          VERSION_CODE=$(date -u +"%Y%m%d")
          sed -i "s/versionCode = [0-9]*/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
          
          # Update manifest version
          echo "{" > .release-please-manifest.json
          echo "  \".\": \"${VERSION}\"" >> .release-please-manifest.json
          echo "}" >> .release-please-manifest.json
          
          # Update CHANGELOG.md
          DATE=$(date -u +"%Y-%m-%d")
          ENTRY="## [${VERSION}] - ${DATE}

          ${{ steps.changes.outputs.changes }}"
          
          if [ -f CHANGELOG.md ]; then
            # Create temp file with new entry
            {
              head -1 CHANGELOG.md
              echo ""
              echo "${ENTRY}"
              echo ""
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi
          
          # Commit changes
          git add app/build.gradle.kts .release-please-manifest.json CHANGELOG.md
          git commit -m "chore: release ${VERSION}"
          
          # Push branch
          git push origin "${BRANCH_NAME}"
          
          # Create PR
          PR_URL=$(gh pr create \
            --title "chore: release ${VERSION}" \
            --body "## Release ${VERSION}

          This PR was automatically created by the CalVer release workflow.

          ### Changes in this release

          ${{ steps.changes.outputs.changes }}

          ---
          **Merge this PR to create the release.**" \
            --base main \
            --head "${BRANCH_NAME}" \
            --label "release")
          
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pull-request-number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "Created PR #${PR_NUMBER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing release PR
        if: steps.changes.outputs.has_changes == 'true' && steps.check_pr.outputs.existing_pr == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.check_pr.outputs.branch }}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Checkout existing release branch
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}"
          
          # Rebase on main
          git rebase origin/main
          
          # Update version in build.gradle.kts
          sed -i "s/versionName = \".*\" \/\/ x-release-please-version/versionName = \"${VERSION}\" \/\/ x-release-please-version/" app/build.gradle.kts
          
          # Update versionCode
          VERSION_CODE=$(date -u +"%Y%m%d")
          sed -i "s/versionCode = [0-9]*/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
          
          # Update manifest
          echo "{" > .release-please-manifest.json
          echo "  \".\": \"${VERSION}\"" >> .release-please-manifest.json
          echo "}" >> .release-please-manifest.json
          
          # Update CHANGELOG.md
          DATE=$(date -u +"%Y-%m-%d")
          ENTRY="## [${VERSION}] - ${DATE}

          ${{ steps.changes.outputs.changes }}"
          
          if [ -f CHANGELOG.md ]; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "${ENTRY}"
              echo ""
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi
          
          # Commit and push
          git add app/build.gradle.kts .release-please-manifest.json CHANGELOG.md
          git commit --amend -m "chore: release ${VERSION}" || git commit -m "chore: release ${VERSION}"
          git push origin "${BRANCH}" --force
          
          # Update PR body
          gh pr edit "${{ steps.check_pr.outputs.pr_number }}" \
            --title "chore: release ${VERSION}" \
            --body "## Release ${VERSION}

          This PR was automatically created by the CalVer release workflow.

          ### Changes in this release

          ${{ steps.changes.outputs.changes }}

          ---
          **Merge this PR to create the release.**"
          
          echo "Updated PR #${{ steps.check_pr.outputs.pr_number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Create release when release PR is merged
  create-release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    outputs:
      release_created: ${{ steps.create_release.outputs.release_created }}
      version: ${{ steps.extract_version.outputs.version }}
      tag_name: ${{ steps.create_release.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version from branch name
        id: extract_version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Get changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          # Extract changelog section for this version
          {
            echo "body<<EOF"
            awk "/## \[${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          TAG="v${VERSION}"
          
          gh release create "${TAG}" \
            --title "Release ${VERSION}" \
            --notes "## Changes in this release

          ${{ steps.changelog.outputs.body }}"
          
          echo "release_created=true" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
          echo "Created release ${TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Build and upload APK after release is created
  build-release:
    name: Build Release APK
    needs: create-release
    if: needs.create-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK to GitHub Release
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}