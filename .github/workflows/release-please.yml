name: CalVer Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even without conventional commits'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.check_release.outputs.release_created }}
      tag_name: ${{ steps.create_release.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate CalVer version
        id: version
        run: |
          # Generate CalVer version: YYYY.MM.DD
          VERSION=$(date -u +"%Y.%m.%d")
          
          # Check if this version tag already exists
          PATCH=0
          BASE_VERSION=$VERSION
          while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            VERSION="${BASE_VERSION}.${PATCH}"
          done
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Check for changes since last release
        id: check_release
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found, will create first release"
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "changes=Initial release" >> $GITHUB_OUTPUT
          else
            # Check if there are commits since last tag
            COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline)
            if [ -n "$COMMITS" ] || [ "${{ github.event.inputs.force_release }}" == "true" ]; then
              echo "Changes found since ${LATEST_TAG}"
              echo "release_created=true" >> $GITHUB_OUTPUT
              echo "changes<<EOF" >> $GITHUB_OUTPUT
              git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "No changes since ${LATEST_TAG}"
              echo "release_created=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update version in build.gradle.kts
        if: steps.check_release.outputs.release_created == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/versionName = \".*\" \/\/ x-release-please-version/versionName = \"${VERSION}\" \/\/ x-release-please-version/" app/build.gradle.kts
          
          # Update versionCode based on date (YYYYMMDD format as integer)
          VERSION_CODE=$(date -u +"%Y%m%d")
          sed -i "s/versionCode = [0-9]*/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
          
          echo "Updated build.gradle.kts with version ${VERSION} and versionCode ${VERSION_CODE}"

      - name: Update manifest version
        if: steps.check_release.outputs.release_created == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "{" > .release-please-manifest.json
          echo "  \".\": \"${VERSION}\"" >> .release-please-manifest.json
          echo "}" >> .release-please-manifest.json
          echo "Updated manifest with version ${VERSION}"

      - name: Generate changelog entry
        if: steps.check_release.outputs.release_created == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%d")
          
          # Create changelog entry
          ENTRY="## [${VERSION}] - ${DATE}

          ${{ steps.check_release.outputs.changes }}
          "
          
          # Prepend to CHANGELOG.md or create it
          if [ -f CHANGELOG.md ]; then
            # Insert after the header
            if grep -q "# Changelog" CHANGELOG.md; then
              sed -i "/# Changelog/a\\
          \\
          ${ENTRY}" CHANGELOG.md
            else
              echo -e "# Changelog\n\n${ENTRY}\n$(cat CHANGELOG.md)" > CHANGELOG.md
            fi
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit version changes
        if: steps.check_release.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts .release-please-manifest.json CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Create Release
        if: steps.check_release.outputs.release_created == 'true'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in this release
            
            ${{ steps.check_release.outputs.changes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release APK
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}